<style>

/* Estilos para el título superior */
.titulo-top {
    position: fixed;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    text-align: center;
    z-index: 1000;
    pointer-events: none;
    margin: 0;
}
.titulo-top h1 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px #f60, 0 0 20px #f30;
}
.player{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:90%;max-width:600px;display:flex;align-items:center;gap:10px;padding:10px;border:2px solid #f60;border-radius:999px;background:0 0;box-shadow:0 0 15px #f60,0 0 30px #f30;z-index:1000;font-size:14px;color:#fff}.player button{background:0 0;border:none;color:#fff;font-size:22px;cursor:pointer;filter:drop-shadow(0 0 6px #ff6600);transition:transform .2s}.player button:hover{transform:scale(1.2);filter:drop-shadow(0 0 10px #ff3300)}.progress{flex-grow:1;height:14px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden;cursor:pointer;position:relative}.progress-bar{height:100%;width:0%;background:linear-gradient(270deg,#f60,#f30,#f09,#f60);background-size:400% 400%;border-radius:999px;box-shadow:0 0 10px #f60;animation:flowing 6s ease infinite}@keyframes flowing{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}.time{min-width:74px;text-align:right;font-size:12px;color:#fff;text-shadow:0 0 5px #f60}

<div id="yt-player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src=https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js></script>

<script>
// --- CONTROLADOR DE AUDIO DE YOUTUBE ---
let player;
const playBtn = document.getElementById("play");
const progress = document.getElementById("progress");
const progressBar = document.getElementById("progress-bar");
const timeDisplay = document.getElementById("time");
let updateTimer;

// ID del video asignado automáticamente
const YOUTUBE_VIDEO_ID = "7Am3C8b1Hxs"; 

function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
        videoId: YOUTUBE_VIDEO_ID,
        playerVars: {
            'autoplay': 0,
            'controls': 0,
            'loop': 1,
            'playlist': YOUTUBE_VIDEO_ID 
        },
        events: {
            'onStateChange': onPlayerStateChange
        }
    });
}

function formatTime(e) {
    if (!e || !isFinite(e)) return "0:00";
    return Math.floor(e / 60) + ":" + Math.floor(e % 60).toString().padStart(2, "0");
}

playBtn.addEventListener("click", () => {
    if (!player || typeof player.getPlayerState !== "function") return;
    
    const state = player.getPlayerState();
    if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
        playBtn.textContent = "▶️";
    } else {
        player.playVideo();
        playBtn.textContent = "⏸️";
    }
});

function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
        updateTimer = setInterval(() => {
            const currentTime = player.getCurrentTime();
            const duration = player.getDuration();
            const pct = (currentTime / duration) * 100;
            
            progressBar.style.width = (isFinite(pct) ? pct : 0) + "%";
            timeDisplay.textContent = formatTime(currentTime) + " / " + formatTime(duration);
        }, 300);
    } else {
        clearInterval(updateTimer);
    }
}

progress.addEventListener("click", e => {
    if (!player || typeof player.getDuration !== "function") return;
    const t = progress.getBoundingClientRect();
    const n = (e.clientX - t.left) / t.width;
    const duration = player.getDuration();
    if (isFinite(duration)) {
        player.seekTo(n * duration, true);
    }
});
